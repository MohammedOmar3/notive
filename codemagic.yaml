workflows:
  ios-build-and-deploy:
    name: iOS Build, Test & Deploy
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        # Codemagic UI → Team → Environment variable groups
        #
        # firebase_credentials:
        #   FIREBASE_APP_ID  — e.g. 1:123456789:ios:abcdef123456
        #   FIREBASE_TOKEN   — from `firebase login:ci`
        - firebase_credentials
        # Uncomment once Apple Developer account + signing credentials are configured
        # in Codemagic UI → Team → Environment variable groups:
        #   CERTIFICATE_PRIVATE_KEY  — base64-encoded .p12
        #   CERTIFICATE_PASSWORD     — .p12 password
        #   PROVISIONING_PROFILE     — base64-encoded .mobileprovision
        # - signing_credentials
      vars:
        XCODE_SCHEME: "Notive"
        BUNDLE_ID: "com.notive.app"
        # iPhone 16 Pro used for simulator testing (closest available to target device)
        SIMULATOR_DESTINATION: "platform=iOS Simulator,name=iPhone 16 Pro,OS=latest"
      xcode: latest

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate
          echo "Generated Notive.xcodeproj"

      - name: Resolve Swift Package dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project Notive.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Run unit tests
        script: |
          xcodebuild test \
            -project Notive.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -destination "$SIMULATOR_DESTINATION" \
            -clonedSourcePackagesDirPath SourcePackages \
            -resultBundlePath TestResults.xcresult \
            | xcpretty --color
        test_report: TestResults.xcresult

      - name: Build (unsigned — signing not yet configured)
        script: |
          xcodebuild build \
            -project Notive.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      # ── Uncomment the steps below once signing_credentials is configured ──────
      #
      # - name: Set up code signing
      #   script: |
      #     keychain initialize
      #     echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > /tmp/certificate.p12
      #     keychain add-certificates --certificate /tmp/certificate.p12 \
      #       --certificate-password "$CERTIFICATE_PASSWORD"
      #     echo "$PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
      #     mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
      #     cp /tmp/profile.mobileprovision \
      #       ~/Library/MobileDevice/Provisioning\ Profiles/notive.mobileprovision
      #
      # - name: Build archive
      #   script: |
      #     xcodebuild archive \
      #       -project Notive.xcodeproj \
      #       -scheme "$XCODE_SCHEME" \
      #       -sdk iphoneos \
      #       -archivePath Notive.xcarchive \
      #       -clonedSourcePackagesDirPath SourcePackages \
      #       | xcpretty --color
      #
      # - name: Export IPA
      #   script: |
      #     xcodebuild -exportArchive \
      #       -archivePath Notive.xcarchive \
      #       -exportPath Notive.ipa \
      #       -exportOptionsPlist ExportOptions.plist
      #
      # - name: Upload to Firebase App Distribution
      #   script: |
      #     npm install -g firebase-tools
      #     firebase appdistribution:distribute Notive.ipa/Notive.ipa \
      #       --app "$FIREBASE_APP_ID" \
      #       --token "$FIREBASE_TOKEN" \
      #       --groups "testers" \
      #       --release-notes "Build $BUILD_NUMBER — $CM_COMMIT"

    artifacts:
      - TestResults.xcresult
      - Notive.xcarchive
      - "Notive.ipa/*.ipa"

    publishing:
      email:
        recipients:
          # Add your email here to receive build notifications
          - o.mohammed3@hotmail.com
        notify:
          success: true
          failure: true
